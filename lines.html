<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMSI 麓原交通协会">
    <meta name="keywords" content="麓原地图下载，时刻表查询">
    <meta name="author" content="koWel_22">
    
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">

    <title>线路查询 | [架空] 麓交协</title>

    <!-- ===== 引入外部 CSS ===== -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/text_page_style.css">
    <link rel="stylesheet" href="../css/route.css">

</head>




<body>

    
    <!-- 导航栏 -->
    <div id="header-placeholder"></div>

    <!-- 按钮容器（用于居中或定位） -->
<div class="btn-back-wrapper">
    <a href="javascript:void(0)" onclick="goBackOrHome();" class="btn-back">
        <span class="btn-back-icon">←</span>
        <span class="btn-back-text">返回</span>
    </a>
</div>


<!-- 线路信息网格 -->
<div class="line-info-container">
    <!-- 由 JS 动态生成 -->
</div>

    <!-- 按钮容器（用于居中或定位） -->
<div class="line-btn-container">
    <a href="javascript:void(0)" class="btn-line btn-direction">
        <span class="btn-line-icon">⇄</span>
        <span class="btn-line-text">切换方向</span>
    </a>
    <a href="javascript:void(0)" class="btn-line btn-refresh">
        <span class="btn-line-icon">⟳</span>
        <span class="btn-line-text">刷新线路状态</span>
    </a>
    <div class="line-station-container">
        <!-- 由 JS 动态生成 -->
    </div>
</div>

<!-- 停车站信息 -->
   
    

    <!-- 页脚 -->
    <div id="footer-placeholder"></div>


    <!-- <footer> -->
    <!-- ===== JS导入 ===== -->
    <script src="js/main.js"></script>
    <script src="js/route.js"></script>
    <!--</footer> -->
    
    <script>
        // 加载导航栏
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data)
            .catch(err => console.log('Header加载失败'));

        // 加载页脚
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data)
            .catch(err => console.log('Footer加载失败'));
    </script>

</body>
    <!-- ===== 部分内容AI辅助 ===== -->
</html>
