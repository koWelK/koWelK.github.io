<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMSI Luyuan Transit Association">
    <meta name="keywords" content="Map download, timetable query">
    <meta name="author" content="koWel_22">
    
    <!-- <link rel="icon" type="image/svg+xml" href="images/logo_192px.svg"> -->
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">

    <title>[Fictional] Luyuan Transit Association</title>

    <!-- ===== 引入外部 CSS ===== -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fade.css">

</head>



<body>

    
    <!-- 导航栏 -->
    <div id="header-placeholder"></div>


    <!-- 搜索栏区块 -->
    <div class="search-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for routes">
            <span id="clearBtn" class="clear-btn">✕</span>
            <button id="searchBtn">Search</button>
        </div>
        <div id="searchResults"></div> <!-- 结果显示区 -->
    </div>
    
    <!-- 运行情报模块 -->
    <section class="status-module">
        <h2>Service Status</h2>
        <div class="status-cards" id="statusCards">
            <!-- JS动态生成 -->
        </div>
    </section>

<div class="carousel-wrapper">
    <!-- ===== 宣传轮播栏 ===== -->
    <section class="carousel-section">
        <div class="carousel-container">
            <div class="carousel-track" id="carouselTrack">
                <!-- 图片列表（用你的图片替换 src） -->
                <div class="carousel-slide">
                    <img src="images/banner1.png" alt="宣传海报1">
                </div>
                <div class="carousel-slide">
                    <img src="images/banner2.png" alt="宣传海报2">
                </div>
                <div class="carousel-slide">
                    <img src="images/banner3.png" alt="宣传海报3">
                </div>
                <div class="carousel-slide">
                    <img src="images/banner4.png" alt="宣传海报4">
                </div>
                    <!-- 更多图片按此格式添加 -->
            </div>
            <!-- 左右切换按钮（可选） -->
            <button class="carousel-btn prev" id="prevBtn">❮</button>
            <button class="carousel-btn next" id="nextBtn">❯</button>
            <!-- 指示点 -->
            <div class="carousel-dots" id="carouselDots"></div>
        </div>
    </section>
</div>

<!-- ==================== -->
<!-- 【最新情报】 -->
<!-- ==================== -->
<div class="informations-wrapper">   <!-- ① 外层：全宽背景 -->
    <section class="informations-container"> <!-- ② 内层：居中限制宽度 -->
        
        <!-- ③ 核心层：这里放你的标题和内容 -->
        <h2 class="informations-title">Latest News</h2>
        <div id="informationsContainer">
            <!-- 加载中提示 -->
            <p style="text-align:center; color:#999;">Loading...</p>
        </div>
    </section>
</div>

<!-- ===== 广告 ===== -->
<div class="promo-wrapper">
    <section class="promo-container">
        <h2 class="promo-titleN">Welcome to Luyuan!</h2>
        
        <!-- <div class="promo-grid"> -->
            
        <div class="promo-grid" id="promoGrid">
            <!-- JS 会动态渲染这里 -->
        </div>

        </div>

    </section>
</div>

<!-- ==================== -->
<!-- 【地图下载】 -->
<!-- ==================== -->
<!-- 按钮容器（用于居中或定位） -->
<div class="btn-wrapper">
    <a href="download.html" class="btn-modern">
        <span class="btn-text">Start Operation</span>
        <span class="btn-icon">→</span>
    </a>
</div>

    <!-- 页脚 -->
    <div id="footer-placeholder"></div>

        <!-- ===== 加载遮罩 ===== -->
    <div id="loader-overlay">
        <div class="loader-box">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="loading-tip">Loading… almost there. Please wait.</div>
        </div>
    </div>

    <!-- <footer> -->
    <!-- ===== JS导入 ===== -->
    <script src="js/main.js"></script>
    <!-- script src="js/fade.js"></script -->
    <!--</footer> -->
    
    <script>
        // 加载导航栏
        fetch('components/header_en.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data)
            .catch(err => console.log('Header加载失败'));

        // 加载页脚
        fetch('components/footer_en.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data)
            .catch(err => console.log('Footer加载失败'));
    </script>

</body>
    <!-- ===== 部分内容AI辅助 ===== -->
</html>
