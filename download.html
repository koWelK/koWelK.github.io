<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>



<body>

    
    <!-- 导航栏 -->
    <div id="header-placeholder"></div>

    <!-- 地图下载 -->
                <div class="grid-container">
                    <!-- 左侧区块 -->
                    <a href="https://pan.baidu.com/s/12yEl51p0lyySRATHDceBcg" class="grid-item item-left">
                        <div class="overlay-text">
                            OMSI 麓原地图下载<br>
                            <span style="font-size: 0.6em; font-weight: normal;">版本: 0.3.2 (20260628) 提取码: 262w</span>

                    </a>
                    <!-- 右上区块 -->
                    <a href="WIP.html" class="grid-item item-right-top">
                        <div class="overlay-text">
                            电子版地图<br>
                            <span style="font-size: 0.6em; font-weight: normal;">路网图等 版本: 20260307</span>
                        </div>
                    </a>
                    <!-- 右下区块 -->
                    <a href="WIP.html" class="grid-item item-right-bottom">
                        <div class="overlay-text">
                            运营许可证<br>
                            <span style="font-size: 0.6em; font-weight: normal;">点击浏览 (纯娱乐)</span>
                        </div>
                    </a>
                </div>

    

    <!-- 页脚 -->
    <div id="footer-placeholder"></div>
    <!-- ===== 加载遮罩 ===== -->
    <div id="loader-overlay">
        <div class="loader-box">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="loading-tip">加载中，预计很快完成，请稍候...</div>
        </div>
    </div>

    <!-- <footer> -->
    <!-- ===== JS导入 ===== -->
    <script src="js/main.js"></script>
    <script src="js/fade.js"></script>
    <!--</footer> -->
    
    <script>
        // 加载导航栏
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data)
            .catch(err => console.log('Header加载失败'));

        // 加载页脚
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data)
            .catch(err => console.log('Footer加载失败'));
