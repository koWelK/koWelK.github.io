<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMSI 麓原交通协会">
    <meta name="keywords" content="地图下载，时刻表查询">
    <meta name="author" content="koWel_22">
    <title>[架空] 麓原交通协会</title>

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 导航栏外层 ===== */
        nav {
            background: linear-gradient(to right, #4768bb, #3fa2e0);
            padding: 0 20px; /* 左右内边距 */
        }

        /* ===== 导航栏容器（flex 父级） ===== */
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;   /* 限制最大宽度，可选 */
            margin: 0 auto;      /* 水平居中（如果限制了宽度） */
            height: 70px;        /* 固定高度，让 Logo 和菜单垂直居中 */
        }

        /* ===== Logo 区域 ===== */
        .logo {
            flex-shrink: 0;      /* 防压缩 */
        }
        .logo img {
            height: 50px;        /* 根据图片实际尺寸调整 */
            display: block;
        }

        /* ===== 菜单列表 ===== */
        .nav-container ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }
        .nav-container ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: color 0.2s;
        }
        .nav-container ul li a:hover {
            color: #f1c40f;
        }

        /* ===== 搜索栏样式 ===== */
        .search-wrapper {
            max-width: 600px;
            margin: 30px auto;      /* 上下间距，自动居中 */
            padding: 0 15px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;        /* 手机端换行 */
            justify-content: center;
        }

        .search-box input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #1b4dba;
        }

        .search-box button {
            padding: 12px 30px;
            background: #1b4dba;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #3f3f52;
        }

        #searchResults {
            margin-top: 20px;
            text-align: left;
        }

        #searchResults ul {
            list-style: none;
            padding: 0;
        }
        #searchResults li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        #searchResults .no-result {
            color: #999;
            text-align: center;
        }



        footer {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px 0;          /* 上下内边距 */
            text-align: center;       /* 文字居中 */
            font-size: 14px;
            margin-top: 40px;         /* 与上方内容隔开一段距离（可选） */
        }

        .footer-container p {
            margin: 5px 0;            /* 段落间距 */
        }


        /* ======================================== */
        /* 手机端适配（屏幕宽度小于 768px）           */
        /* ======================================== */
        @media (max-width: 768px) {

            /* ----- 1. 导航栏：取消固定高度，允许换行 ----- */
            .nav-container {
                flex-wrap: wrap;          /* 允许 Logo 和菜单换行 */
                justify-content: center;  /* 居中排列 */
                height: auto;             /* 取消固定高度，让高度自适应 */
                gap: 10px;                /* Logo 和菜单之间的间距 */
                padding: 10px 15px;
            }

            .logo img {
                height: 35px;             /* 手机端缩小 Logo */
            }

            .nav-container ul {
                gap: 15px;                /* 缩小菜单项间距 */
                flex-wrap: wrap;          /* 菜单项太多时允许换行 */
                justify-content: center;  /* 菜单居中 */
            }

            .nav-container ul li a {
                font-size: 15px;          /* 缩小字体，防挤 */
            }


            /* ----- 2. 正文主区域：减少内边距 ----- */
            main {
                padding: 20px 15px;
                min-height: auto;         /* 取消最小高度限制 */
            }


            /* ----- 3. 横幅区：文字缩小 ----- */
            .banner {
                padding: 25px 15px;
            }
            .banner h1 {
                font-size: 24px;
            }
            .banner p {
                font-size: 15px;
            }


            /* ----- 4. 功能卡片：强制变为一列 ----- */
            .features {
                flex-direction: column;   /* 水平排列 → 垂直排列（一列） */
                align-items: stretch;     /* 让卡片宽度自动撑满屏幕 */
                gap: 20px;
            }

            .card {
                flex: none;               /* 取消 flex:1 的等宽效果 */
                width: 100%;              /* 占满整行 */
                min-width: 0;             /* 取消最小宽度限制 */
                padding: 20px;
            }


            /* ----- 5. 底部栏：缩小内边距 ----- */
            footer {
                padding: 20px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var searchBtn = document.getElementById('searchBtn');
        var searchInput = document.getElementById('searchInput');
        var resultsDiv = document.getElementById('searchResults');

        // ===== 1. 定义公司颜色映射 =====
        var companyColors = {
            '纪云交通': '#1976D2',
            '城北客运': '#f7a919',
            '福竹公交': '#D32F2F',
        };
        // 默认颜色（未定义的公司使用）
        var defaultColor = '#333333';

        // ===== 2. 获取公司对应的颜色 =====
        function getCompanyColor(company) {
            return companyColors[company] || defaultColor;
        }

        // ===== 3. 执行搜索（使用外部数据） =====
        function performSearch(data) {
            var query = searchInput.value.trim();
            if (query === '') {
                resultsDiv.innerHTML = '<p class="no-result">请输入线路名或站点</p>';
                return;
            }

            var results = data.filter(function(item) {
                return item.line.includes(query) ||
                    item.stops.some(function(stop) {
                        return stop.includes(query);
                    });
            });

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p class="no-result">未找到相关线路或站点</p>';
            } else {
                var html = '<ul style="list-style:none;padding:0;">';
                results.forEach(function(item) {
                    var encodedLine = encodeURIComponent(item.line);
                    var color = getCompanyColor(item.company);
                    // 线路名称使用动态颜色，并显示公司名称
                    html += '<li style="padding:10px;border-bottom:1px solid #eee;">' +
                        '<a href="lines.html?line=' + encodedLine + '" ' +
                        'style="display:block;text-decoration:none;color:' + color + ';font-weight:bold;">' +
                        '<span style="color:' + color + ';">' + item.line + '</span>' +
                        '（' + item.stops.join(' → ') + '）' +
                        ' <span style="font-weight:normal;color:#888;font-size:0.85em;">[' + item.company + ']</span>' +
                        '<span style="float:right;color:#1ba0ba;">查看详情 →</span>' +
                        '</a>' +
                        '</li>';
                });
                html += '</ul>';
                resultsDiv.innerHTML = html;
            }
        }

        // ===== 4. 从外部文件加载数据 =====
        fetch('RouteData/route.json')
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('数据文件加载失败，HTTP状态码：' + response.status);
                }
                return response.json();
            })
            .then(function(data) {
                searchBtn.addEventListener('click', function() {
                    performSearch(data);
                });
                searchInput.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') {
                        performSearch(data);
                    }
                });
                console.log('✅ 数据加载成功，共 ' + data.length + ' 条线路');
            })
            .catch(function(error) {
                console.error('❌ 加载数据出错:', error);
                resultsDiv.innerHTML = '<p class="no-result" style="color:red;">⚠️ 数据加载失败，请检查 route.json 文件是否存在</p>';
            });
    });
</script>




<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <img src="Head_text.png" alt="麓原交通协会 Logo">
            </div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="introduce.html">简介</a></li>
                <li><a href="download.html">地图下载</a></li>
                <li><a href="fuction.html">信息查询</a></li>
                <li><a href="index_en.html">语言 / Language</a></li>
            </ul>
        </div>
    </nav>
    <!-- 搜索栏区块 -->
    <div class="search-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="线路搜索">
            <button id="searchBtn">搜索</button>
        </div>
        <div id="searchResults"></div> <!-- 结果显示区 -->
    </div>


    <footer>
        <div class="footer-container">

    </div>
    </footer>
</body>
</html>
