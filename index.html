<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMSI 麓原交通协会">
    <meta name="keywords" content="地图下载，时刻表查询">
    <meta name="author" content="koWel_22">
    
    <!-- <link rel="icon" type="image/svg+xml" href="images/logo_192px.svg"> -->
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">

    <title>[架空] 麓原交通协会</title>

    <!-- ===== 引入外部 CSS ===== -->
    <link rel="stylesheet" href="css/style_index.css">
    <link rel="stylesheet" href="css/fade.css">

</head>



<body>
    <!-- 导航栏 -->
    <div id="header-placeholder"></div>

    <!-- ===== 背景轮播（作为背景图） ===== -->
    <div class="carousel-wrapper">
        <section class="carousel-section">
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-slide"><img src="https://bee-reg-ab.imagency.cn/p/771a46e9563d5fe120f355f7345ec910.png" alt="宣传海报1" onerror="this.onerror=null; this.src='images/banner1.png';"></div>
                    <div class="carousel-slide"><img src="https://bee-reg-ab.imagency.cn/p/d4797ba4a59b128dbf40d25e4477870a.png" alt="宣传海报3" onerror="this.onerror=null; this.src='images/banner3.png';"></div>
                    <div class="carousel-slide"><img src="https://bee-reg-ab.imagency.cn/p/fdee3e76e488e25ca1e20cca93ed0e68.png" alt="宣传海报4" onerror="this.onerror=null; this.src='images/banner4.png';"></div>
                    <div class="carousel-slide"><img src="https://bee-reg-ab.imagency.cn/p/07cf10c8cc0d185d3a6329e1f563e9e8.png" alt="宣传海报5" onerror="this.onerror=null; this.src='images/banner5.png';"></div>
                </div>
                <button class="carousel-btn prev" id="prevBtn">❮</button>
                <button class="carousel-btn next" id="nextBtn">❯</button>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </section>
    </div>

    <!-- ===== 运营情报模块（半透明底板覆盖轮播） ===== -->
    <section class="status-module">
        <div class="status-panel">
            <div class="status-header">
                <h2>运营情报</h2>
                <div id="weatherStatus" class="weather-float"><!-- JS动态渲染 --></div>
            </div>
            <div class="status-cards" id="statusCards"><!-- JS动态生成 --></div>
        </div>
    </section>

    <!-- 搜索栏（可保留在下方） -->
    <div class="search-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="线路搜索">
            <span id="clearBtn" class="clear-btn">✕</span>
            <button id="searchBtn">搜索</button>
        </div>
        <div id="searchResults"></div>
    </div>

<!-- ==================== -->
<!-- 【最新情报】 -->
<!-- ==================== -->
<div class="informations-wrapper">   <!-- ① 外层：全宽背景 -->
    <section class="informations-container"> <!-- ② 内层：居中限制宽度 -->
        
        <!-- ③ 核心层：这里放你的标题和内容 -->
        <h2 class="informations-title">新闻</h2>
        <div id="informationsContainer">
            <!-- 加载中提示 -->
            <p style="text-align:center; color:#999;">加载中...</p>
        </div>
    </section>
</div>

<!-- ===== 广告 ===== -->
<div class="promo-wrapper">
    <section class="promo-container">
        <h2 class="promo-titleN">欢迎来到麓原！</h2>
        
        <!-- <div class="promo-grid"> -->
            
        <div class="promo-grid" id="promoGrid">
            <!-- JS 会动态渲染这里 -->
        </div>

        </div>

    </section>
</div>

<!-- ==================== -->
<!-- 【地图下载】 -->
<!-- ==================== -->
<!-- 按钮容器（用于居中或定位） -->
<div class="btn-wrapper">
    <a href="download.html" class="btn-modern btn-shine">
        <span class="btn-text">开始运转</span>
        <span class="btn-icon">→</span>
    </a>
</div>
    <!-- 页脚 -->
    <div id="footer-placeholder"></div>


    <!-- <footer> -->
    <!-- ===== JS导入 ===== -->
    <script src="js/main.js"></script>
    <!-- script src="js/fade.js"></script -->
    <!--</footer> -->
    
    <script>
        // 加载导航栏
        fetch('components/header_index.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data)
            .catch(err => console.log('Header加载失败'));

        // 加载页脚
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data)
            .catch(err => console.log('Footer加载失败'));
    </script>

</body>
    <!-- ===== 部分内容AI辅助 ===== -->
</html>
