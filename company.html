<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMSI 麓原交通协会">
    <meta name="keywords" content="地图下载，时刻表查询">
    <meta name="author" content="koWel_22">
    
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">

    <title>未开发区域... | [架空] 麓交协</title>

    <!-- ===== 引入外部 CSS ===== -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/text_page_style.css">
    <link rel="stylesheet" href="css/fade.css">
    <link rel="stylesheet" href="css/companys_page.css">

</head>




<body>

    
    <!-- 导航栏 -->
    <div id="header-placeholder"></div>

<!-- 按钮容器（用于居中或定位） -->
<div class="btn-back-wrapper">
    <a href="index.html" class="btn-back">
        <span class="btn-back-icon">←</span>
        <span class="btn-back-text">返回</span>
    </a>
</div>

     <!-- ===== 公司内容区 ===== -->
    <main class="company-page" id="companyPage">
        <!-- JS 动态渲染，或显示“加载中” -->
        <p style="text-align:center; color:#999; padding:40px 0;">加载中...</p>
    </main>

    
        <!-- ===== 加载遮罩 ===== -->
    <div id="loader-overlay">
        <div class="loader-box">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="loading-tip">加载中，预计很快完成，请稍候...</div>
        </div>
    </div>

    <!-- 页脚 -->
    <div id="footer-placeholder"></div>


    <!-- <footer> -->
    <!-- ===== JS导入 ===== -->
    <script src="js/main.js"></script>
    <script src="js/fade.js"></script>
    <script src="js/companys_page.js"></script>
    <!--</footer> -->
    
    <script>
        // 加载导航栏
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data)
            .catch(err => console.log('Header加载失败'));

        // 加载页脚
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data)
            .catch(err => console.log('Footer加载失败'));
    </script>

</body>
    <!-- ===== 部分内容AI辅助 ===== -->
</html>
